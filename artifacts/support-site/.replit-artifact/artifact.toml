kind = "web"
previewPath = "/support/"
title = "Deen o Dunya — Support Site"
version = "1.0.0"
id = "artifacts/support-site"
router = "path"

[[services]]
name = "web"
paths = [ "/support/" ]
localPort = 25459

[services.development]
run = "pnpm --filter @workspace/support-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/support-site", "run", "build" ]
serve = "static"
publicDir = "artifacts/support-site/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25459"
BASE_PATH = "/support/"
